name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor (copy web build into android/)
        run: npx cap sync android

      - name: Restore signing keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Brak sekretu KEYSTORE_BASE64. Dodaj 4 sekrety w Settings → Secrets and variables → Actions (KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD), potem uruchom workflow ponownie."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/rikipo-release.keystore
          {
            echo "storeFile=rikipo-release.keystore"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > android/app/keystore.properties

      - name: Build signed release APK
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk rikipo-trader.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rikipo-trader-apk
          path: rikipo-trader.apk
          if-no-files-found: error

      - name: Publish APK to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Rikipo Trader — APK (latest)
          files: rikipo-trader.apk
          body: |
            Najnowszy build aplikacji **Rikipo Trader** — podpisany APK (release),
            klucz trzymany prywatnie w GitHub Secrets.

            **Instalacja na telefonie:**
            1. Pobierz plik `rikipo-trader.apk` poniżej.
            2. Otwórz go — Android poprosi o zgodę na instalację z nieznanych źródeł
               (włącz ją dla przeglądarki / menedżera plików).
            3. Zainstaluj i gotowe. Kolejne wersje zainstalują się „na wierzch"
               (ten sam podpis), bez odinstalowywania.

            > Wersja do użytku prywatnego. Nie wymaga sklepu Play.
