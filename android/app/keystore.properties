# Signing credentials for the Rikipo Trader release APK.
# NOTE: committed on purpose so CI can produce a stably-signed APK with zero
# setup — this is a personal, sideloaded app (not on Google Play). The stable
# signature is what lets new versions install *over* the old one.
# If you ever want this kept private, move these values to GitHub Secrets and
# have the workflow write this file at build time.
storeFile=rikipo-release.keystore
storePassword=rikipo123
keyAlias=rikipo
keyPassword=rikipo123
